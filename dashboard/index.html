<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stock Team Agent — Operator Dashboard v5.27</title>
  <style>
    :root {
      --bg: #0f1419;
      --card: #1a1f2e;
      --card-hover: #232a3d;
      --border: #2a3142;
      --text: #e4e7eb;
      --text-dim: #8b95a7;
      --buy: #10b981;
      --hold: #f59e0b;
      --sell: #ef4444;
      --high-risk: #ef4444;
      --low-risk: #10b981;
      --medium-risk: #f59e0b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 24px;
      min-height: 100vh;
    }
    header {
      max-width: 1400px;
      margin: 0 auto 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
    }
    h1 {
      font-size: 24px;
      font-weight: 600;
    }
    .subtitle {
      color: var(--text-dim);
      font-size: 13px;
      margin-top: 4px;
    }
    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .toggle {
      display: flex;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }
    .toggle button {
      background: transparent;
      color: var(--text-dim);
      border: none;
      padding: 8px 16px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }
    .toggle button.active {
      background: var(--text);
      color: var(--bg);
    }
    .summary {
      max-width: 1400px;
      margin: 0 auto 24px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
    }
    .stat {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
    }
    .stat-label {
      color: var(--text-dim);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .stat-value {
      font-size: 24px;
      font-weight: 600;
      margin-top: 4px;
    }
    .grid {
      max-width: 1400px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      transition: all 0.2s;
    }
    .card:hover {
      background: var(--card-hover);
      transform: translateY(-2px);
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .ticker {
      font-size: 16px;
      font-weight: 600;
    }
    .risk-badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 12px;
      font-weight: 500;
    }
    .risk-high { background: rgba(239, 68, 68, 0.2); color: var(--high-risk); }
    .risk-low { background: rgba(16, 185, 129, 0.2); color: var(--low-risk); }
    .risk-medium { background: rgba(245, 158, 11, 0.2); color: var(--medium-risk); }
    .signal-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-size: 12px;
      color: var(--text-dim);
    }
    .signal-bar {
      display: flex;
      height: 6px;
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 12px;
    }
    .signal-buy { background: var(--buy); }
    .signal-hold { background: var(--hold); }
    .signal-sell { background: var(--sell); }
    .score-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-top: 1px solid var(--border);
      font-size: 13px;
    }
    .score-label { color: var(--text-dim); }
    .score-value { font-weight: 500; }
    .components {
      margin-top: 8px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 4px;
      font-size: 11px;
    }
    .component {
      display: flex;
      justify-content: space-between;
      padding: 2px 4px;
      color: var(--text-dim);
    }
    .component-value { color: var(--text); }
    footer {
      max-width: 1400px;
      margin: 24px auto 0;
      text-align: center;
      color: var(--text-dim);
      font-size: 12px;
    }
    .loading {
      text-align: center;
      padding: 48px;
      color: var(--text-dim);
    }
    .error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid var(--high-risk);
      padding: 16px;
      border-radius: 8px;
      max-width: 600px;
      margin: 48px auto;
      color: var(--high-risk);
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Stock Team Agent — Operator Dashboard</h1>
      <div class="subtitle">v5.28 · 11 tickers · 4D fund_heavy + 7D sentiment/news/macro · real close prices</div>
    </div>
    <div class="controls">
      <div class="toggle" id="dim-toggle">
        <button class="active" onclick="setDimension('4d')">4D</button>
        <button onclick="setDimension('7d')">7D</button>
      </div>
      <div class="toggle" id="src-toggle">
        <button class="active" onclick="setCloseSource('real')">real</button>
        <button onclick="setCloseSource('mock')">mock</button>
      </div>
    </div>
  </header>

  <div id="summary" class="summary"></div>
  <div id="grid" class="grid">
    <div class="loading">載入 fixture 資料中…</div>
  </div>

  <footer>
    <div>Source: <code>scripts/tests/fixtures/tickers_fundamentals.json</code> · API: <code>scripts/dashboard_api.py</code></div>
    <div style="margin-top:4px;">v5.26 Lesson #54 (close_source=real) · v5.28 Lesson #55 (4D→7D)</div>
  </footer>

  <script>
    // HIGH-risk tickers (per v5.26 business decision brief)
    const HIGH_RISK_TICKERS = new Set([
      'AAPL',         // +34.76pp diff
      'GOOGL',        // -59.47pp diff
      '000333.SZ',    // -90.88pp diff
      '000858.SZ',    // -22.81pp diff
      '600519.SS',    // -20.93pp diff
    ]);

    let currentData = null;
    let currentSource = 'real';
    let currentDimension = '4d';   // '4d' (default) 或 '7d' (v5.28 NEW)

    async function fetchCrossMarket(closeSource) {
      const url = `http://localhost:8080/api/cross_market?close_source=${closeSource}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error(`API ${res.status}: ${res.statusText}`);
      return res.json();
    }

    async function fetchCrossMarket7D() {
      const url = `http://localhost:8080/api/cross_market_7d`;
      const res = await fetch(url);
      if (!res.ok) throw new Error(`7D API ${res.status}: ${res.statusText}`);
      return res.json();
    }

    async function loadFixture() {
      // 優先嘗試 dashboard API (real backtest), fallback 至 fixture JSON
      try {
        currentData = await fetchCrossMarket(currentSource);
        return;
      } catch (e) {
        // API 不可用 — fallback
      }
      try {
        const res = await fetch('../scripts/tests/fixtures/tickers_fundamentals.json');
        if (!res.ok) throw new Error('fetch failed');
        currentData = await res.json();
      } catch (e) {
        document.getElementById('grid').innerHTML =
          '<div class="error">無法讀取資料來源。<br><br>' +
          '<b>選項 1</b>: 啟動 dashboard API — <code>cd ~/stock-team-agent && python -m uvicorn scripts.dashboard_api:app --port 8080</code>' +
          '<br><br><b>選項 2</b>: 啟動 HTTP server — <code>cd ~/stock-team-agent && python -m http.server 8080</code>' +
          '<br><br>然後開啟 <a href="http://localhost:8080/dashboard/index.html" style="color:#10b981">http://localhost:8080/dashboard/index.html</a></div>';
        return;
      }
    }

    async function setCloseSource(src) {
      currentSource = src;
      document.querySelectorAll('#src-toggle button').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');

      // 重抓 API 數據 (real ↔ mock 真實切換)
      document.getElementById('grid').innerHTML = '<div class="loading">載入 ' + src + ' 數據中…</div>';
      try {
        if (currentDimension === '7d') {
          currentData = await fetchCrossMarket7D();
        } else {
          currentData = await fetchCrossMarket(src);
        }
      } catch (e) {
        // API 失敗 → 用 fixture fallback (僅 real 模式有效)
        try {
          const res = await fetch('../scripts/tests/fixtures/tickers_fundamentals.json');
          currentData = await res.json();
        } catch (e2) {
          document.getElementById('grid').innerHTML =
            '<div class="error">切換失敗: ' + e.message + '</div>';
          return;
        }
      }
      render();
    }

    async function setDimension(dim) {
      // dim ∈ {'4d', '7d'}
      currentDimension = dim;
      document.querySelectorAll('#dim-toggle button').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');

      document.getElementById('grid').innerHTML = '<div class="loading">載入 ' + dim.toUpperCase() + ' 數據中…</div>';
      try {
        if (dim === '7d') {
          currentData = await fetchCrossMarket7D();
        } else {
          currentData = await fetchCrossMarket(currentSource);
        }
      } catch (e) {
        document.getElementById('grid').innerHTML =
          '<div class="error">' + dim.toUpperCase() + ' 切換失敗: ' + e.message + '<br><br>請確認 dashboard_api 已啟動: <code>cd ~/stock-team-agent && python -m uvicorn scripts.dashboard_api:app --port 8080</code></div>';
        return;
      }
      render();
    }

    function classifyRisk(ticker) {
      if (HIGH_RISK_TICKERS.has(ticker)) return 'high';
      return 'low';
    }

    function renderSummary() {
      const sd = currentData.signal_distribution_per_ticker;
      const tickers = Object.keys(sd);
      const buyCount = tickers.filter(t => sd[t].majority === 'buy').length;
      const holdCount = tickers.filter(t => sd[t].majority === 'hold').length;
      const sellCount = tickers.filter(t => sd[t].majority === 'sell').length;
      const highRiskCount = tickers.filter(t => HIGH_RISK_TICKERS.has(t)).length;
      const meanScore = (tickers.reduce((a, t) => a + sd[t].final_score, 0) / tickers.length).toFixed(4);

      document.getElementById('summary').innerHTML = `
        <div class="stat">
          <div class="stat-label">Tickers</div>
          <div class="stat-value">${tickers.length}</div>
        </div>
        <div class="stat">
          <div class="stat-label">BUY Signals</div>
          <div class="stat-value" style="color:var(--buy)">${buyCount}</div>
        </div>
        <div class="stat">
          <div class="stat-label">HOLD Signals</div>
          <div class="stat-value" style="color:var(--hold)">${holdCount}</div>
        </div>
        <div class="stat">
          <div class="stat-label">SELL Signals</div>
          <div class="stat-value" style="color:var(--sell)">${sellCount}</div>
        </div>
        <div class="stat">
          <div class="stat-label">HIGH-Risk</div>
          <div class="stat-value" style="color:var(--high-risk)">${highRiskCount}</div>
        </div>
        <div class="stat">
          <div class="stat-label">Mean final_score</div>
          <div class="stat-value">${meanScore}</div>
        </div>
      `;
    }

    function renderCard(ticker, data) {
      const risk = classifyRisk(ticker);
      const c = data.components;
      const is7D = currentDimension === '7d';

      // 7D 模式: 顯示 composite_7d + signal (來自 7D API); 4D 模式: 顯示 final_score + majority
      const topScore = is7D ? data.composite_7d.toFixed(4) : data.final_score.toFixed(4);
      const topSignal = is7D ? data.signal : data.majority.toUpperCase();
      const topSignalColor = topSignal === 'BUY' || topSignal === 'buy'
        ? 'var(--buy)'
        : topSignal === 'SELL' || topSignal === 'sell'
          ? 'var(--sell)'
          : 'var(--hold)';
      const topLabel = is7D ? 'composite_7d' : 'final_score';
      const topSourceLabel = is7D ? 'signal (7D)' : 'majority';

      return `
        <div class="card">
          <div class="card-header">
            <div class="ticker">${ticker}</div>
            <div class="risk-badge risk-${risk}">${risk === 'high' ? '🔴 HIGH' : '🟢 LOW'}</div>
          </div>
          <div class="signal-row">
            <span>BUY ${(data.buy_ratio*100).toFixed(1)}%</span>
            <span>HOLD ${(data.hold_ratio*100).toFixed(1)}%</span>
            <span>SELL ${(data.sell_ratio*100).toFixed(1)}%</span>
          </div>
          <div class="signal-bar">
            <div class="signal-buy" style="width:${data.buy_ratio*100}%"></div>
            <div class="signal-hold" style="width:${data.hold_ratio*100}%"></div>
            <div class="signal-sell" style="width:${data.sell_ratio*100}%"></div>
          </div>
          <div class="score-row">
            <span class="score-label">${topSourceLabel}</span>
            <span class="score-value" style="color:${topSignalColor}">${topSignal}</span>
          </div>
          <div class="score-row">
            <span class="score-label">${topLabel}</span>
            <span class="score-value">${topScore}</span>
          </div>
          <div class="score-row">
            <span class="score-label">signal_entropy</span>
            <span class="score-value">${data.signal_entropy.toFixed(4)}</span>
          </div>
          <div class="components">
            <div class="component"><span>market</span><span class="component-value">${c.market.toFixed(3)}</span></div>
            <div class="component"><span>tech</span><span class="component-value">${c.technical.toFixed(3)}</span></div>
            <div class="component"><span>fund</span><span class="component-value">${c.fundamental.toFixed(3)}</span></div>
            <div class="component"><span>risk</span><span class="component-value">${c.risk.toFixed(3)}</span></div>
            <div class="component"><span>sentiment</span><span class="component-value">${c.sentiment.toFixed(3)}</span></div>
            <div class="component"><span>news</span><span class="component-value">${c.news.toFixed(3)}</span></div>
            <div class="component"><span>macro</span><span class="component-value">${c.macro.toFixed(3)}</span></div>
          </div>
        </div>
      `;
    }

    function render() {
      if (!currentData) return;
      // 7D 模式: data 結構是 {config, per_ticker[AAPL].components + composite_7d + signal}
      // 4D 模式: data 結構是 cross_market_comparison() 或 fixture signal_distribution_per_ticker
      if (currentDimension === '7d') {
        render7D();
      } else {
        if (!currentData.signal_distribution_per_ticker) return;
        render4D();
      }
    }

    function render4D() {
      renderSummary();
      const sd = currentData.signal_distribution_per_ticker;
      const tickers = Object.keys(sd).sort();
      const html = tickers.map(t => renderCard(t, sd[t])).join('');
      document.getElementById('grid').innerHTML = html;
    }

    function render7D() {
      const pt = currentData.per_ticker;
      const tickers = Object.keys(pt).sort();

      // Summary: 7D 版本的 BUY/HOLD/SELL count 來自 per_ticker[t].signal
      const buyCount = tickers.filter(t => pt[t].signal === 'BUY').length;
      const holdCount = tickers.filter(t => pt[t].signal === 'HOLD').length;
      const sellCount = tickers.filter(t => pt[t].signal === 'SELL').length;
      const highRiskCount = tickers.filter(t => HIGH_RISK_TICKERS.has(t)).length;
      const meanComposite7d = (tickers.reduce((a, t) => a + pt[t].composite_7d, 0) / tickers.length).toFixed(4);

      document.getElementById('summary').innerHTML = `
        <div class="stat">
          <div class="stat-label">Tickers</div>
          <div class="stat-value">${tickers.length}</div>
        </div>
        <div class="stat">
          <div class="stat-label">7D BUY</div>
          <div class="stat-value" style="color:var(--buy)">${buyCount}</div>
        </div>
        <div class="stat">
          <div class="stat-label">7D HOLD</div>
          <div class="stat-value" style="color:var(--hold)">${holdCount}</div>
        </div>
        <div class="stat">
          <div class="stat-label">7D SELL</div>
          <div class="stat-value" style="color:var(--sell)">${sellCount}</div>
        </div>
        <div class="stat">
          <div class="stat-label">HIGH-Risk</div>
          <div class="stat-value" style="color:var(--high-risk)">${highRiskCount}</div>
        </div>
        <div class="stat">
          <div class="stat-label">Mean composite_7d</div>
          <div class="stat-value">${meanComposite7d}</div>
        </div>
      `;

      // 把 7D per_ticker 結構 map 成 card 期望的結構 (補 signal_entropy / buy_ratio 等)
      const cardData = {};
      for (const ticker of tickers) {
        const d = pt[ticker];
        cardData[ticker] = {
          buy_ratio: d.buy_ratio,
          hold_ratio: d.hold_ratio,
          sell_ratio: d.sell_ratio,
          majority: d.majority,
          final_score: d.composite_7d,
          composite_7d: d.composite_7d,
          signal: d.signal,
          signal_entropy: 0,  // 7D 沒信號熵 (純 composite)
          components: {
            market: d.market,
            technical: d.tech,
            fundamental: d.fund,
            risk: d.risk,
            sentiment: d.sentiment,
            news: d.news,
            macro: d.macro,
          },
        };
      }
      const html = tickers.map(t => renderCard(t, cardData[t])).join('');
      document.getElementById('grid').innerHTML = html;
    }

    // 啟動
    loadFixture();
  </script>
</body>
</html>
